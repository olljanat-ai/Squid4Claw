name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/firewall4ai:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/firewall4ai:latest
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dosfstools mtools squashfs-tools xorriso

      - name: Create ISO
        run: |
          VERSION=${GITHUB_REF_NAME}
          docker create --name export ghcr.io/${{ github.repository_owner }}/firewall4ai:latest
          mkdir rootfs
          docker export export | tar -x -C rootfs
          docker rm export
          sudo ./elemental --debug build-iso --bootloader-in-rootfs --extra-cmdline "" dir:rootfs
          sudo mv elemental.iso firewall4ai-${VERSION}.iso

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            firewall4ai-*.iso
