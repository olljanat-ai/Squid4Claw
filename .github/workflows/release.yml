name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run tests
        run: go test -race -timeout 60s ./...

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dosfstools mtools squashfs-tools xorriso

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Build OS image
        run: |
          VERSION=${GITHUB_REF_NAME}
          docker build . \
            --build-arg VERSION=${VERSION} \
            -t ghcr.io/${{ github.repository_owner }}/firewall4ai:${VERSION}
          docker tag ghcr.io/${{ github.repository_owner }}/firewall4ai:${VERSION} ghcr.io/${{ github.repository_owner }}/firewall4ai:latest
          docker push ghcr.io/${{ github.repository_owner }}/firewall4ai:${VERSION}
          docker push ghcr.io/${{ github.repository_owner }}/firewall4ai:latest

      - name: Create ISO
        run: |
          VERSION=${GITHUB_REF_NAME}
          docker create --name export ghcr.io/${{ github.repository_owner }}/firewall4ai:latest
          mkdir rootfs
          docker export export | tar -x -C rootfs
          docker rm export
          sudo ./rootfs/usr/bin/elemental --debug build-iso --bootloader-in-rootfs --extra-cmdline "" dir:rootfs
          sudo mv elemental.iso firewall4ai-${VERSION}.iso

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            firewall4ai-*.iso
