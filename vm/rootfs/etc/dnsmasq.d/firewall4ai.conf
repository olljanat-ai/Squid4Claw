# Firewall4AI internal network DHCP and DNS configuration

# Only listen on the internal interface
interface=eth1
bind-interfaces

# DHCP range: 10.255.255.10 - 10.255.255.254, infinite lease (permanent allocation)
dhcp-range=10.255.255.10,10.255.255.254,255.255.255.0,infinite

# Set this host as the default gateway (so iptables can control traffic)
dhcp-option=option:router,10.255.255.1

# Set this host as DNS server
dhcp-option=option:dns-server,10.255.255.1

# Upstream DNS servers
server=1.1.1.1
server=1.0.0.1

# Don't read /etc/resolv.conf for upstream servers
no-resolv

# Log DHCP transactions
log-dhcp
