# bootargs.cfg inherits from grub.cfg several context variables:
#   'img' => defines the image path to boot from
#   'state_label' => label of the state partition filesystem
#   'oem_label' => label of the oem partition filesystem
#   'recovery_label' => label of the recovery partition filesystem
#   'snapshotter' => snapshotter type
#
# bootargs.cfg sets:
#   'kernelcmd' => kernel command line parameters
#   'kernel' => kernel binary path
#   'initramfs' => initramfs binary path

if [ -n "${img}" ]; then
  set img_arg="elemental.image=${img}"
fi

if [ "${mode}" == "recovery" ]; then
  set kernelcmd="console=tty1 console=ttyS0 root=LABEL=${recovery_label} ${img_arg} elemental.mode=${mode} elemental.oemlabel=${oem_label}"
else
  if [ "${snapshotter}" == "btrfs" ]; then
    set snap_arg="elemental.snapshotter=btrfs"
  fi
  set kernelcmd="console=tty1 console=ttyS0 root=LABEL=${state_label} ${img_arg} ${snap_arg} elemental.mode=${mode} elemental.oemlabel=${oem_label} panic=5"
fi

set kernel=/${root_subpath}boot/vmlinuz
set initramfs=/${root_subpath}boot/initrd
